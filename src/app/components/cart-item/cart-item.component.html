<div class="flex items-center justify-between gap-3 w-full px-4 py-3 bg-white rounded-lg border border-gray-200 shadow-sm">

  <!-- Data on the left -->
  <div class="flex flex-col text-sm text-gray-800">
    <span class="font-medium">{{ item().name }}</span>
    <span class="text-gray-500">{{ '$' + item().price }} x {{ item().quantity }}</span>
  </div>

  <!-- Buttons on the right -->
  <div class="flex items-center gap-1.5 shrink-0 ml-auto">
    <button
      (click)="increase()"
      class="hover:cursor-pointer w-7 h-7 flex items-center justify-center rounded-md border border-gray-300 text-gray-600 hover:bg-gray-100 active:scale-95 transition">
      +
    </button>
    <button
      (click)="decrease()"
      class="hover:cursor-pointer w-7 h-7 flex items-center justify-center rounded-md border border-gray-300 text-gray-600 hover:bg-gray-100 active:scale-95 transition">
      -
    </button>
    <button
      (click)="remove()"
      class="hover:cursor-pointer w-7 h-7 flex items-center justify-center rounded-md border border-red-200 text-red-500 hover:bg-red-50 active:scale-95 transition">
      ✕
    </button>
  </div>

</div>
